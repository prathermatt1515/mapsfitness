<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0A1628" />
  <title>MAPsFitness — offline</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: 'Inter', -apple-system, system-ui, sans-serif;
      background: #0A1628;
      color: #E8EDF3;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
      text-align: center;
      -webkit-font-smoothing: antialiased;
    }
    img { width: 120px; height: auto; margin-bottom: 24px; }
    h1 { font-size: 22px; font-weight: 600; margin-bottom: 8px; letter-spacing: -0.3px; }
    p { font-size: 14px; color: #6B7A8F; max-width: 320px; line-height: 1.5; margin-bottom: 24px; }
    button {
      font-family: inherit;
      background: #C8102E;
      color: #FFFFFF;
      padding: 12px 24px;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
    }
    button:active { transform: scale(0.985); }
    .hashtag {
      position: absolute;
      bottom: 32px;
      font-size: 11px;
      letter-spacing: 3px;
      font-weight: 700;
      color: #C8102E;
    }
  </style>
</head>
<body>
  <img src="assets/icons/icon-192.png" alt="MAPsFitness" />
  <h1>You're offline</h1>
  <p>MAPsFitness needs a connection to sync your data. Check your signal and try again.</p>
  <button onclick="location.reload()">Try again</button>
  <div class="hashtag">#RELENTLESS</div>
</body>
</html>
